services:
  keftrade-campaign-worker:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    command:
      - python
      - -m
      - app.workers.campaign_runner
      - --worker-id
      - ${KEFTRADE_WORKER_ID:-campaign-worker-${HOSTNAME:-local}}
      - --poll-seconds
      - ${KEFTRADE_WORKER_POLL_SECONDS:-5}
      - --stop-file
      - /tmp/keftrade-campaign-worker.stop
    environment:
      DATABASE_URL: ${DATABASE_URL}
      KEFTRADE_ENV: ${KEFTRADE_ENV:-production-validation}
      KEFTRADE_WORKER_ID: ${KEFTRADE_WORKER_ID:-campaign-worker-${HOSTNAME:-local}}
      PYTHONUNBUFFERED: "1"
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "python", "-c", "import os; assert os.environ.get('DATABASE_URL'); print('campaign-worker-ready')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
