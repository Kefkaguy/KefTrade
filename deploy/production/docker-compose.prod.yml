services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-keftrade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-keftrade}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-keftrade} -d ${POSTGRES_DB:-keftrade}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  migrate:
    image: postgres:16-alpine
    restart: "no"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../database/migrations:/migrations:ro
    command:
      - sh
      - -ec
      - |
        for migration in /migrations/*.sql; do
          echo "Applying $${migration}"
          psql "$${DATABASE_URL}" -v ON_ERROR_STOP=1 -f "$${migration}"
        done

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  worker:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_healthy
    command:
      - python
      - -m
      - app.workers.campaign_runner
      - --worker-id
      - ${KEFTRADE_WORKER_ID:-campaign-worker}
      - --poll-seconds
      - ${KEFTRADE_WORKER_POLL_SECONDS:-5}
      - --stop-file
      - /tmp/keftrade-campaign-worker.stop
    healthcheck:
      test: ["CMD", "python", "-c", "import os, pathlib; assert os.environ.get('DATABASE_URL'); assert not pathlib.Path('/tmp/keftrade-campaign-worker.stop').exists()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/keftrade.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx-cache:/var/cache/nginx
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  broker-worker:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "app.workers.broker_runner"]
    healthcheck:
      test: ["CMD", "python", "-c", "import os; assert os.environ.get('DATABASE_URL'); assert os.environ.get('BROKER_ORDER_SUBMISSION_ENABLED','false').lower() == 'false'; assert os.environ.get('EXTERNAL_PAPER_EXECUTION_ENABLED','false').lower() == 'false'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  certbot:
    image: certbot/certbot:latest
    profiles: ["tls"]
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt

volumes:
  postgres-data:
  nginx-cache:
