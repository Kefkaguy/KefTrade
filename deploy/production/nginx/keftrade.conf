gzip on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_types application/json application/javascript text/css text/plain text/xml application/xml;

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream keftrade_api {
    server api:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://keftrade_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}

# After DNS is pointed at the VPS and certificates are issued, replace the
# HTTP-only server above with a TLS server for api.yourdomain.com.
